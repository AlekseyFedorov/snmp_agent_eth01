<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720">
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .board { fill: #203746; stroke: #0f1d25; stroke-width: 3; }
      .pin { fill: #f5c542; stroke: #6f5510; stroke-width: 2; }
      .sensor { fill: #ffffff; stroke: #1d2730; stroke-width: 3; }
      .wire-signal { fill: none; stroke: #1976d2; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-gnd { fill: none; stroke: #202020; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .wire-bus { fill: none; stroke: #202020; stroke-width: 7; stroke-linecap: round; }
      .label { font: 24px Arial, sans-serif; fill: #17212b; }
      .small { font: 18px Arial, sans-serif; fill: #344252; }
      .tiny { font: 15px Arial, sans-serif; fill: #526171; }
      .pin-label { font: 20px Arial, sans-serif; fill: #ffffff; }
      .title { font: bold 32px Arial, sans-serif; fill: #17212b; }
      .note { font: 20px Arial, sans-serif; fill: #17212b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="720"/>

  <text class="title" x="60" y="60">Door opening sensors wiring for WT32-ETH01</text>
  <text class="small" x="60" y="92">Firmware uses GPIO_PULLUP_ONLY: dry contact closes GPIO to GND on alarm.</text>

  <rect class="board" x="80" y="140" width="330" height="430" rx="14"/>
  <text class="pin-label" x="150" y="190">WT32-ETH01 / ESP32</text>
  <text class="tiny" x="140" y="220">No VCC is connected to door contacts</text>

  <rect class="pin" x="350" y="270" width="38" height="28" rx="4"/>
  <text class="pin-label" x="130" y="292">GPIO25 - DOOR 1</text>

  <rect class="pin" x="350" y="360" width="38" height="28" rx="4"/>
  <text class="pin-label" x="130" y="382">GPIO26 - DOOR 2</text>

  <rect class="pin" x="350" y="470" width="38" height="28" rx="4"/>
  <text class="pin-label" x="130" y="492">GND</text>

  <path class="wire-signal" d="M388 284 H560 V235 H720"/>
  <path class="wire-signal" d="M388 374 H560 V435 H720"/>

  <path class="wire-gnd" d="M388 484 H520"/>
  <path class="wire-bus" d="M520 200 V530"/>
  <path class="wire-gnd" d="M520 235 H640"/>
  <path class="wire-gnd" d="M520 435 H640"/>

  <circle cx="520" cy="484" r="8" fill="#202020"/>
  <circle cx="520" cy="235" r="8" fill="#202020"/>
  <circle cx="520" cy="435" r="8" fill="#202020"/>

  <rect class="sensor" x="720" y="185" width="270" height="110" rx="10"/>
  <text class="label" x="758" y="225">Door sensor 1</text>
  <text class="small" x="758" y="254">NO dry contact</text>
  <line x1="640" y1="235" x2="705" y2="235" class="wire-gnd"/>
  <line x1="720" y1="235" x2="780" y2="235" class="wire-gnd"/>
  <line x1="845" y1="235" x2="975" y2="235" class="wire-signal"/>
  <line x1="790" y1="235" x2="840" y2="210" stroke="#1d2730" stroke-width="4" stroke-linecap="round"/>
  <circle cx="780" cy="235" r="6" fill="#1d2730"/>
  <circle cx="845" cy="235" r="6" fill="#1d2730"/>
  <text class="tiny" x="758" y="282">open door =&gt; contact closed =&gt; GPIO25 = 0 =&gt; SNMP 1</text>

  <rect class="sensor" x="720" y="385" width="270" height="110" rx="10"/>
  <text class="label" x="758" y="425">Door sensor 2</text>
  <text class="small" x="758" y="454">NO dry contact</text>
  <line x1="640" y1="435" x2="705" y2="435" class="wire-gnd"/>
  <line x1="720" y1="435" x2="780" y2="435" class="wire-gnd"/>
  <line x1="845" y1="435" x2="975" y2="435" class="wire-signal"/>
  <line x1="790" y1="435" x2="840" y2="410" stroke="#1d2730" stroke-width="4" stroke-linecap="round"/>
  <circle cx="780" cy="435" r="6" fill="#1d2730"/>
  <circle cx="845" cy="435" r="6" fill="#1d2730"/>
  <text class="tiny" x="758" y="482">open door =&gt; contact closed =&gt; GPIO26 = 0 =&gt; SNMP 1</text>

  <text class="note" x="90" y="630">Important: use NO contact, or invert firmware logic for typical NC magnetic sensors.</text>
  <text class="small" x="90" y="662">GPIO input is pulled up internally. The sensor only shorts the GPIO pin to GND.</text>
</svg>
